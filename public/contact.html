</head>
<body>
 <!-- ===== NAVBAR ===== -->

        >

    </ul>
  </nav>
  <!-- ===== PORTRAIT ===== -->
  <div class="layout .overflow-hidden">
    <div class="portrait drop-in">
      <img src="./images/Portrait.jpg" />
      <div class="bio-container">
        <div class="bio">
          <div class="bio-info">
            <p class="name">Euripide Carpio</p>
            <p>Full Stack Website Developer</p>
            <p>Santo Domingo,Dominican Republic</p>
          </div>
          <div class="links-potrait">
            <ul>
              <li><img src="./images/Linked In.svg" /></li>
              <li><img src="./images/Github.svg" /></li>
              <li><img src="./images/Whatsapp.svg" /></li>
              <li><img src="./images/Instagram.svg" /></li>
            </ul>
          </div>
        </div>
        <a href="contact.html" class="button">Let's Talk !</a>
      </div>
    </div>

    <main>
      <section class="contact-me drop-in">
        <h1 class="header">
          Let's Create <br />
          Something <span class="hero">Amazing</span>
        </h1>
        <form action="https://formsubmit.co/euripidec@gmail.com" method="POST">
          <label for="name">Name</label>
          <input type="text" id="name" placeholder="Your Name" required/>
          <label for="email">E-Mail</label>
          <input type="email" id="email" placeholder="Your@email.com" required/>
          <label for="message">Message</label>
          <textarea
            id="message"
            name="message"
            placeholder="Your Message"
          ></textarea>
          <input class="input" type="submit" value="Send" />
        </form>
      </section>
    </main>
  </div>
</body>
